document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ine;gap:9px;padding:3px 0\">\n                      <span style=\"flex:none;width:58px;text-align:right;font-family:'Bitter',serif;font-weight:700;font-size:12.5px;color:#6B4426\">{{ ing.amountText }}<\u002Fspan>\n                      <span style=\"flex:1;min-width:0;font-size:12.5px;color:#4D4438;font-weight:500;line-height:1.3\">{{ ing.nameText }}<span style=\"color:#9A8156;font-weight:500\">{{ ing.noteText }}<\u002Fspan><\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <div style=\"display:flex;align-items:center;gap:8px;margin-top:11px\">\n                <span style=\"{{ s.pillStyle }}\">{{ s.kindLabel }}<\u002Fspan>\n                <span style=\"font-size:11.5px;color:#9A8156;font-weight:600\">{{ s.durLabel }}<\u002Fspan>\n              <\u002Fdiv>\n              <sc-if value=\"{{ s.flex }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"margin-top:11px;padding-top:11px;border-top:1px dashed #E7D6BB\">\n                  <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:8px\">\n                    <span style=\"font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:#B6A485\">Gärzeit anpassen<\u002Fspan>\n                    <span style=\"font-size:11px;font-weight:600;color:#B6A485\">{{ s.rangeLabel }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"display:flex;gap:8px\">\n                    <button onclick=\"{{ s.onEarlier }}\" style=\"{{ s.earlierStyle }}\">‹ früher beginnen<\u002Fbutton>\n                    <button onclick=\"{{ s.onLater }}\" style=\"{{ s.laterStyle }}\">später ›<\u002Fbutton>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ s.isLast }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"display:flex;align-items:center;gap:8px;margin-top:12px;padding-top:11px;border-top:1px dashed #E0CBA8\">\n                  <span style=\"font-size:12px;color:#9A8156;font-weight:600\">Brot fertig<\u002Fspan>\n                  <span style=\"font-family:'Bitter',serif;font-weight:800;font-size:17px;color:#B5532A;margin-left:auto\">{{ s.fertigLabel }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n\n      <div style=\"text-align:center;font-size:11px;color:#C2B393;font-weight:600;margin-top:8px\">Zeiten rückwärts berechnet · Raumtemperatur ~22&nbsp;°C<\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:392,&quot;height&quot;:830}}\">\nclass Component extends DCLogic {\n  RECIPES = [\n    {\n      id: 'sauerteig', name: 'Sauerteigbrot', totalShort: '~28 Std',\n      subtitle: 'Knusprige Kruste, aromatische Krume · Marcel Paa',\n      steps: [\n        { title: 'Vorteig ansetzen', dur: 15, kind: 'prep', ingredients: [{ amount: 30, unit: 'g', name: 'Sauerteig' }, { amount: 110, unit: 'g', name: 'Wasser', note: 'handwarm' }, { amount: 145, unit: 'g', name: 'Weissmehl', note: 'Weizenmehl Type 405/550' }], desc: 'Sauerteig, handwarmes Wasser und Weissmehl verkneten, zur Kugel formen und im Gefäss markieren.' },\n        { title: 'Vorteig gären lassen', dur: 720, min: 480, max: 840, step: 30, kind: 'rise', sleep: true, desc: 'Bei Raumtemperatur gehen lassen, bis sich das Volumen verdreifacht hat.' },\n        { title: 'Hauptteig kneten', dur: 15, kind: 'prep', ingredients: [{ name: 'Reifer Vorteig', note: 'komplett' }, { amount: 300, unit: 'g', name: 'Wasser', note: 'handwarm' }, { amount: 285, unit: 'g', name: 'Weissmehl', note: 'Weizenmehl Type 405/550' }, { amount: 140, unit: 'g', name: 'Roggenmehl hell', note: 'Type 610/815' }, { amount: 9, unit: 'g', name: 'Salz' }], desc: 'Alle Zutaten 10–12 Min. kneten, bis der Teig die Fensterprobe besteht.' },\n        { title: 'Stockgare', dur: 120, min: 90, max: 180, step: 15, kind: 'rise', desc: 'Rund vorformen und zugedeckt bei Raumtemperatur aufgehen lassen.' },\n        { title: 'Rund formen', dur: 15, kind: 'prep', desc: 'Teig schleifen, Spannung aufbauen und mit Verschluss nach oben in den bemehlten Gärkorb setzen.' },\n        { title: 'Stückgare im Kühlschrank', dur: 720, min: 600, max: 960, step: 30, kind: 'cold', sleep: true, desc: 'Zugedeckt im Kühlschrank reifen lassen – entwickelt Aroma und Triebkraft.' },\n        { title: 'Ofen vorheizen', dur: 45, kind: 'prep', desc: 'Mit Gusseisentopf auf 230 °C Ober-/Unterhitze vorheizen.' },\n        { title: 'Einschneiden & backen', dur: 50, kind: 'bake', desc: 'Stürzen, übers Kreuz einschneiden, 40 Min. im Topf, dann 10 Min. offen ausbacken.' },\n      ],\n    },\n    {\n      id: 'weizen', name: 'Helles Weizenbrot', totalShort: '~3,5 Std',\n      subtitle: 'Locker und schnell – ein Hefebrot für denselben Tag',\n      steps: [\n        { title: 'Teig kneten', dur: 15, kind: 'prep', ingredients: [{ amount: 500, unit: 'g', name: 'Weissmehl', note: 'Type 550' }, { amount: 320, unit: 'g', name: 'Wasser', note: 'handwarm' }, { amount: 7, unit: 'g', name: 'Trockenhefe' }, { amount: 10, unit: 'g', name: 'Salz' }], desc: 'Mehl, Wasser, Hefe und Salz glatt und geschmeidig auskneten.' },\n        { title: 'Stockgare', dur: 90, min: 60, max: 150, step: 15, kind: 'rise', desc: 'Zugedeckt gehen lassen, bis sich das Volumen verdoppelt hat.' },\n        { title: 'Formen', dur: 10, kind: 'prep', desc: 'Entgasen, straff zu einem Laib formen und in den Gärkorb legen.' },\n        { title: 'Stückgare', dur: 45, min: 30, max: 75, step: 15, kind: 'rise', desc: 'Bei Raumtemperatur bis zur vollen Gare aufgehen lassen.' },\n        { title: 'Ofen vorheizen', dur: 30, kind: 'prep', desc: 'Mit Backstein oder Blech auf 240 °C vorheizen, Schwaden vorbereiten.' },\n        { title: 'Backen', dur: 40, kind: 'bake', desc: 'Einschneiden, mit Dampf anbacken, dann goldbraun ausbacken.' },\n      ],\n    },\n    {\n      id: 'roggen', name: 'Roggenmischbrot', totalShort: '~16 Std',\n      subtitle: 'Kräftig & saftig – Sauerteig mit Roggen und Weizen',\n      steps: [\n        { title: 'Sauerteig auffrischen', dur: 10, kind: 'prep', ingredients: [{ amount: 50, unit: 'g', name: 'Anstellgut' }, { amount: 200, unit: 'g', name: 'Roggenmehl', note: 'Type 1150' }, { amount: 200, unit: 'g', name: 'Wasser', note: 'handwarm' }], desc: 'Anstellgut mit Roggenmehl und Wasser verrühren.' },\n        { title: 'Sauerteig reifen', dur: 720, min: 600, max: 900, step: 30, kind: 'rise', sleep: true, desc: 'Über Nacht bei Raumtemperatur reifen lassen, bis er schön sauer duftet.' },\n        { title: 'Hauptteig mischen', dur: 15, kind: 'prep', ingredients: [{ name: 'Reifer Sauerteig', note: 'komplett' }, { amount: 300, unit: 'g', name: 'Wasser', note: 'handwarm' }, { amount: 300, unit: 'g', name: 'Weizenmehl', note: 'Type 1050' }, { amount: 250, unit: 'g', name: 'Roggenmehl', note: 'Type 1150' }, { amount: 14, unit: 'g', name: 'Salz' }], desc: 'Sauerteig mit Roggen-, Weizenmehl, Wasser und Salz zu einem klebrigen Teig mischen.' },\n        { title: 'Teigruhe', dur: 60, min: 30, max: 90, step: 15, kind: 'rise', desc: 'Abgedeckt entspannen lassen.' },\n        { title: 'Formen', dur: 15, kind: 'prep', desc: 'Mit nassen Händen rund wirken und in den Gärkorb setzen.' },\n        { title: 'Stückgare', dur: 90, min: 60, max: 120, step: 15, kind: 'rise', desc: 'Gehen lassen, bis sich feine Risse an der Oberfläche zeigen.' },\n        { title: 'Ofen vorheizen', dur: 45, kind: 'prep', desc: 'Auf 250 °C vorheizen, fallend backen.' },\n        { title: 'Backen', dur: 60, kind: 'bake', desc: 'Kräftig mit Schwaden anbacken und dunkel ausbacken.' },\n      ],\n    },\n    {\n      id: 'broetchen', name: 'Übernacht-Brötchen', totalShort: '~12 Std',\n      subtitle: 'Knusprige Frühstücksbrötchen ohne Kneten',\n      steps: [\n        { title: 'Teig anrühren', dur: 10, kind: 'prep', ingredients: [{ amount: 500, unit: 'g', name: 'Weissmehl', note: 'Type 550' }, { amount: 350, unit: 'g', name: 'Wasser', note: 'kalt' }, { amount: 2, unit: 'g', name: 'Trockenhefe' }, { amount: 10, unit: 'g', name: 'Salz' }], desc: 'Alle Zutaten mit wenig Hefe nur kurz vermengen – nicht kneten.' },\n        { title: 'Übernachtgare im Kühlschrank', dur: 600, min: 480, max: 840, step: 30, kind: 'cold', sleep: true, desc: 'Zugedeckt über Nacht im Kühlschrank reifen lassen.' },\n        { title: 'Abstechen & formen', dur: 20, kind: 'prep', desc: 'Teig auf die bemehlte Fläche geben und Brötchen abstechen.' },\n        { title: 'Stückgare', dur: 30, min: 20, max: 60, step: 10, kind: 'rise', desc: 'Kurz akklimatisieren und antreiben lassen.' },\n        { title: 'Ofen vorheizen', dur: 30, kind: 'prep', desc: 'Auf 240 °C vorheizen, Schwaden vorbereiten.' },\n        { title: 'Backen', dur: 20, kind: 'bake', desc: 'Mit Dampf knusprig goldbraun backen.' },\n      ],\n    },\n  ];\n\n  KIND = {\n    prep: { c: '#C28A3D', label: 'Handarbeit' },\n    rise: { c: '#A8894E', label: 'Gärzeit' },\n    cold: { c: '#6E8597', label: 'Kühlschrank' },\n    bake: { c: '#B5532A', label: 'Backen' },\n  };\n\n  WD = ['So', 'Mo', 'Di', 'Mi', 'Do', 'Fr', 'Sa'];\n  MON = ['Jan.', 'Feb.', 'März', 'Apr.', 'Mai', 'Juni', 'Juli', 'Aug.', 'Sep.', 'Okt.', 'Nov.', 'Dez.'];\n\n  state = { recipeId: 'sauerteig', target: this._defaultTarget('sauerteig'), overrides: {} };\n\n  setDur(i, dir) {\n    const r = this.RECIPES.find(x => x.id === this.state.recipeId);\n    const s = r.steps[i]; if (s.min == null) return;\n    const key = r.id + ':' + i;\n    const ov = { ...(this.state.overrides || {}) };\n    const cur = ov[key] != null ? ov[key] : s.dur;\n    ov[key] = Math.min(s.max, Math.max(s.min, cur + dir * s.step));\n    this.setState({ overrides: ov });\n  }\n\n  _defaultTarget(id) {\n    const r = this.RECIPES.find(x => x.id === id);\n    const total = r.steps.reduce((a, s) => a + s.dur, 0);\n    const t = new Date(Date.now() + total * 60000 + 75 * 60000);\n    t.setMinutes(0, 0, 0);\n    t.setHours(t.getHours() + 1);\n    return t;\n  }\n\n  pad(n) { return String(n).padStart(2, '0'); }\n  fmtDur(m) {\n    if (m < 60) return m + ' Min';\n    const h = Math.floor(m / 60), mm = m % 60;\n    return mm ? h + ' Std ' + mm + ' Min' : h + ' Std';\n  }\n  fmtTimeOnly(d) { const x = new Date(d); return this.pad(x.getHours()) + ':' + this.pad(x.getMinutes()); }\n  fmtDay(d) { const x = new Date(d); return this.WD[x.getDay()] + ', ' + x.getDate() + '. ' + this.MON[x.getMonth()]; }\n  fmtDayTime(d) { const x = new Date(d); return this.WD[x.getDay()] + ' · ' + this.fmtTimeOnly(x); }\n\n  onDateChange = (e) => {\n    const v = e.target.value; if (!v) return;\n    const [y, mo, da] = v.split('-').map(Number);\n    const t = new Date(this.state.target); t.setFullYear(y, mo - 1, da);\n    this.setState({ target: t });\n  };\n  onTimeChange = (e) => {\n    const v = e.target.value; if (!v) return;\n    const [h, mi] = v.split(':').map(Number);\n    const t = new Date(this.state.target); t.setHours(h, mi, 0, 0);\n    this.setState({ target: t });\n  };\n\n  renderVals() {\n    const r = this.RECIPES.find(x => x.id === this.state.recipeId) || this.RECIPES[0];\n    const target = this.state.target;\n    const K = this.KIND;\n\n    const ov = this.state.overrides || {};\n    const steps = r.steps.map((s, i) => {\n      const dur = s.min != null\n        ? Math.min(s.max, Math.max(s.min, ov[r.id + ':' + i] != null ? ov[r.id + ':' + i] : s.dur))\n        : s.dur;\n      return { ...s, dur };\n    });\n    let cursor = target.getTime();\n    for (let i = steps.length - 1; i >= 0; i--) {\n      steps[i].end = cursor;\n      steps[i].start = cursor - steps[i].dur * 60000;\n      cursor = steps[i].start;\n    }\n    const firstStart = steps[0].start;\n    const span = target.getTime() - firstStart || 1;\n    const totalMin = steps.reduce((a, s) => a + s.dur, 0);\n    const hrs = (m) => { const h = m / 60; return (Number.isInteger(h) ? h : h.toFixed(1).replace('.', ',')) + ' Std'; };\n    const rng = (mn, mx) => mn >= 60 ? hrs(mn) + '–' + hrs(mx) : mn + '–' + mx + ' Min';\n    const btn = (on) => `display:inline-flex;align-items:center;justify-content:center;font-family:'Hanken Grotesk';font-weight:700;font-size:12.5px;padding:9px 13px;border-radius:11px;border:1px solid #E0CBA8;background:#F4EBDD;color:#6B4426;cursor:pointer;${on ? '' : 'opacity:.3;pointer-events:none'}`;\n\n    const stepViews = steps.map((s, i) => {\n      const k = K[s.kind]; const isLast = i === steps.length - 1; const st = s.start;\n      return {\n        title: s.title, desc: s.desc, durLabel: this.fmtDur(s.dur), kindLabel: k.label,\n        timeBig: this.fmtTimeOnly(st), dayLabel: this.fmtDay(st), sleep: !!s.sleep, isLast,\n        hasIngredients: !!(s.ingredients && s.ingredients.length),\n        ingredients: (s.ingredients || []).map(ing => ({\n          amountText: ing.amount != null ? ing.amount + (ing.unit ? '\\u00a0' + ing.unit : '') : '+',\n          nameText: ing.name,\n          noteText: ing.note ? '\\u00a0(' + ing.note + ')' : '',\n        })),\n        ingBoxStyle: `margin-top:11px;padding:12px 13px;border-radius:12px;background:${s.sleep ? '#E2E7EF' : '#F4EBDD'};border:1px solid ${s.sleep ? '#CFD8E2' : '#E7D6BB'}`,\n        fertigLabel: this.fmtTimeOnly(target),\n        flex: s.min != null,\n        rangeLabel: s.min != null ? rng(s.min, s.max) : '',\n        onEarlier: () => this.setDur(i, 1),\n        onLater: () => this.setDur(i, -1),\n        earlierStyle: btn(s.min != null && s.dur < s.max),\n        laterStyle: btn(s.min != null && s.dur > s.min),\n        timeStyle: `font-family:'Bitter',serif;font-weight:700;font-size:18px;color:${k.c};line-height:1`,\n        dotStyle: `position:absolute;left:6px;top:3px;width:16px;height:16px;border-radius:50%;background:${k.c};box-shadow:0 0 0 4px #F4EBDD,0 0 0 5px ${k.c}55;z-index:2`,\n        lineStyle: `position:absolute;left:13px;top:${i === 0 ? '11px' : '0'};${isLast ? 'height:11px' : 'bottom:0'};width:2px;background:#E2D5BF`,\n        cardStyle: s.sleep\n          ? 'background:#EBEEF3;border:1px solid #D6DEE6;border-radius:16px;padding:13px 15px'\n          : 'background:#FBF5EA;border:1px solid #EADCC4;border-radius:16px;padding:13px 15px',\n        pillStyle: `display:inline-flex;align-items:center;background:${k.c}22;color:${k.c};font-weight:700;font-size:11px;padding:5px 9px;border-radius:999px;letter-spacing:.02em`,\n      };\n    });\n\n    const bands = [];\n    for (let kk = -1; kk <= 4; kk++) {\n      const ns = new Date(firstStart); ns.setHours(22, 0, 0, 0); ns.setDate(ns.getDate() + kk);\n      const a = Math.max(ns.getTime(), firstStart);\n      const b = Math.min(ns.getTime() + 8 * 3600000, target.getTime());\n      if (b > a) bands.push({ style: `position:absolute;top:0;bottom:0;left:${(a - firstStart) / span * 100}%;width:${(b - a) / span * 100}%;background:#2E22181A;border-radius:7px` });\n    }\n\n    const ticks = [];\n    const m = new Date(firstStart); m.setHours(0, 0, 0, 0); m.setDate(m.getDate() + 1);\n    let guard = 0;\n    while (m.getTime() < target.getTime() && guard < 8) {\n      const left = (m.getTime() - firstStart) / span * 100;\n      ticks.push({\n        label: this.WD[m.getDay()],\n        style: `position:absolute;top:0;bottom:0;left:${left}%;width:1px;background:#0000001A`,\n        labelStyle: `position:absolute;top:100%;left:${left}%;transform:translateX(-50%);margin-top:7px;font-size:10px;font-weight:700;color:#A8946C;white-space:nowrap`,\n      });\n      m.setDate(m.getDate() + 1); guard++;\n    }\n\n    const markers = steps.map(s => ({\n      style: `position:absolute;top:50%;left:${(s.start - firstStart) / span * 100}%;transform:translate(-50%,-50%);width:11px;height:11px;border-radius:50%;background:${K[s.kind].c};border:2px solid #FBF5EA;box-shadow:0 1px 2px rgba(0,0,0,.15);z-index:2`,\n    }));\n    markers.push({ style: `position:absolute;top:50%;left:100%;transform:translate(-50%,-50%);width:15px;height:15px;border-radius:50%;background:#B5532A;border:3px solid #FBF5EA;box-shadow:0 0 0 2px #B5532A55;z-index:3` });\n\n    const recipes = this.RECIPES.map(rr => {\n      const sel = rr.id === r.id;\n      return {\n        name: rr.name, totalShort: rr.totalShort,\n        onSelect: () => this.setState({ recipeId: rr.id, target: this._defaultTarget(rr.id), overrides: {} }),\n        chipStyle: `flex:none;display:flex;flex-direction:column;align-items:flex-start;gap:3px;min-width:120px;text-align:left;cursor:pointer;padding:13px 15px;border-radius:16px;border:1.5px solid ${sel ? '#6B4426' : '#E5D5BB'};background:${sel ? '#6B4426' : '#FBF5EA'};transition:all .15s`,\n        nameStyle: `font-family:'Bitter',serif;font-weight:700;font-size:14.5px;color:${sel ? '#FBF5EA' : '#2E2218'}`,\n        metaStyle: `font-size:11px;font-weight:600;color:${sel ? '#E7C9A0' : '#A8946C'}`,\n      };\n    });\n\n    return {\n      recipes,\n      currentName: r.name, currentSubtitle: r.subtitle,\n      dateValue: `${target.getFullYear()}-${this.pad(target.getMonth() + 1)}-${this.pad(target.getDate())}`,\n      timeValue: this.fmtTimeOnly(target),\n      onDateChange: this.onDateChange, onTimeChange: this.onTimeChange,\n      startLabel: this.fmtDayTime(firstStart),\n      totalLabel: this.fmtDur(totalMin),\n      steps: stepViews,\n      overview: {\n        spanLabel: '≈ ' + Math.round(span / 3600000) + ' Std',\n        startLabel: this.fmtDayTime(firstStart),\n        endLabel: this.fmtTimeOnly(target),\n        nightBands: bands, ticks, markers,\n      },\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
